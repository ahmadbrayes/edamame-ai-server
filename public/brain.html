<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Edamame Brain</title>

<style>
:root{
  --bg:#E9D8C2;
  --green:#9ACD32;
  --greenDark:#7FB800;
  --purple:#8E7CC3;
  --text:#3b3b3b;
  --radius:18px;
  --danger:#d9534f;
  --dangerDark:#bf433f;
}

*{box-sizing:border-box;}

html,body{
  height:100%;
  margin:0;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

.wrap{
  height:100dvh;
  width:min(1000px,100%);
  margin:0 auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.brand h1{
  margin:0;
  font-size:22px;
  color:var(--purple);
}

.brand p{
  margin:0;
  font-size:13px;
  opacity:.75;
}

.topControls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.uploadTop,
.resetTop{
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.uploadTop{ background:var(--green); }
.uploadTop:hover{ background:var(--greenDark); }

.resetTop{ background:var(--danger); }
.resetTop:hover{ background:var(--dangerDark); }

.select{
  height:44px;
  padding:0 14px;
  border-radius:12px;
  border:none;
  background:var(--purple);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
  padding-right:36px;
  background-image:
    linear-gradient(45deg, transparent 50%, rgba(255,255,255,.95) 50%),
    linear-gradient(135deg, rgba(255,255,255,.95) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) 18px,
    calc(100% - 12px) 18px;
  background-size:6px 6px, 6px 6px;
  background-repeat:no-repeat;
}
.select:focus{
  outline:none;
  box-shadow:0 0 0 4px rgba(142,124,195,.22);
}

.productStatus{
  display:none;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,.65);
  border-radius:14px;
  padding:10px 12px;
  min-height:56px;
}

.productStatus.show{
  display:flex;
}

.productThumb{
  width:42px;
  height:42px;
  object-fit:cover;
  border-radius:10px;
  background:#fff;
  border:1px solid rgba(0,0,0,.08);
}

.productStatusText{
  display:flex;
  flex-direction:column;
  gap:2px;
  font-size:13px;
}

.productStatusText strong{
  color:var(--purple);
  font-size:13px;
}

.productStatusText span{
  opacity:.75;
}

.chat{
  flex:1;
  min-height:0;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  background:white;
  padding:18px;
  border-radius:var(--radius);
  display:flex;
  flex-direction:column;
  gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  padding-bottom:90px;
}

.msg{
  max-width:80%;
  padding:12px 16px;
  border-radius:14px;
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
  word-break:break-word;
}

.me{
  align-self:flex-end;
  background:var(--purple);
  color:white;
}

.ai{
  align-self:flex-start;
  background:#f4f4f4;
}

.err{
  align-self:flex-start;
  background:#ffd7dc;
  color:#b30021;
}

.imgWrap{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:flex-start;
}

.img{
  width:min(520px,100%);
  border-radius:14px;
  margin-top:8px;
  display:block;
}

.imgMeta{
  font-size:12px;
  opacity:.72;
}

.dlBtn{
  background:var(--green);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}
.dlBtn:hover{
  background:var(--greenDark);
}

.bar{
  display:flex;
  gap:10px;
  position:sticky;
  bottom:0;
  background:var(--bg);
  padding:12px 0 calc(12px + env(safe-area-inset-bottom));
  z-index:10;
}

textarea{
  flex:1;
  resize:none;
  height:56px;
  border-radius:14px;
  border:2px solid var(--green);
  padding:12px;
  font-size:14px;
  background:#fff;
  color:var(--text);
  touch-action:manipulation;
}
textarea:focus{
  outline:none;
  border-color:var(--purple);
}

.sendBtn{
  background:var(--purple);
  color:white;
  border:none;
  padding:0 20px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  min-width:96px;
}
.sendBtn:hover{ opacity:.9; }
.sendBtn:disabled{
  opacity:.65;
  cursor:not-allowed;
}

@media(max-width:700px){
  .msg{max-width:92%;}
  .wrap{padding:16px;}
  header{
    align-items:flex-start;
    flex-direction:column;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>Edamame Brain</h1>
      <p>Smart. Bold. Deep strategy.</p>
    </div>
  </header>

  <div class="topControls">
    <button id="uploadBtn" class="uploadTop">Upload product image</button>

   <select id="aspect" class="select" title="Aspect ratio">
  <option value="auto" selected>auto</option>
  <option value="16:9">16:9</option>
  <option value="9:16">9:16</option>
  <option value="1:1">1:1</option>
</select>

    <button id="resetBtn" class="resetTop" type="button">Reset session</button>
  </div>

  <div id="productStatus" class="productStatus">
    <img id="productThumb" class="productThumb" alt="Product preview"/>
    <div class="productStatusText">
      <strong>Product ready</strong>
      <span id="productStatusSub">You can now create visuals.</span>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none"/>

  <div id="chat" class="chat"></div>

  <div class="bar">
    <textarea id="input" placeholder="Describe what you want..."></textarea>
    <button id="send" class="sendBtn">Send</button>
  </div>

</div>

<script>
const sessionId = localStorage.getItem("edamame_sessionId") || crypto.randomUUID();
localStorage.setItem("edamame_sessionId", sessionId);

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");
const uploadBtn = document.getElementById("uploadBtn");
const resetBtn = document.getElementById("resetBtn");
const fileInput = document.getElementById("fileInput");
const aspectSel = document.getElementById("aspect");

const productStatus = document.getElementById("productStatus");
const productThumb = document.getElementById("productThumb");
const productStatusSub = document.getElementById("productStatusSub");

let hasProduct = false;
let uploadedProductDataUrl = "";

function slugify(text){
  return (text || "")
    .toLowerCase()
    .replace(/[^a-z0-9\\s-]/g, "")
    .trim()
    .replace(/\\s+/g, "-")
    .slice(0, 50) || "image";
}

function scrollChatToBottom(){
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(text, cls){
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  chat.appendChild(d);
  scrollChatToBottom();
  return d;
}

function setLoadingState(loading){
  send.disabled = loading;
  send.textContent = loading ? "..." : "Send";
}

function setProductState(enabled, previewDataUrl = ""){
  hasProduct = enabled;

  if (enabled) {
    uploadBtn.textContent = "Replace product image";
    productStatus.classList.add("show");
    if (previewDataUrl) {
      uploadedProductDataUrl = previewDataUrl;
      productThumb.src = previewDataUrl;
    }
    productStatusSub.textContent = "Product uploaded. Product stays untouched.";
  } else {
    uploadBtn.textContent = "Upload product image";
    productStatus.classList.remove("show");
    productThumb.removeAttribute("src");
    productStatusSub.textContent = "";
    uploadedProductDataUrl = "";
  }
}

async function watermarkDataUrl(dataUrl){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      const ctx = c.getContext("2d");

      ctx.drawImage(img, 0, 0);

      const pad = Math.round(Math.min(c.width, c.height) * 0.018);
      const fontSize = Math.max(14, Math.round(Math.min(c.width, c.height) * 0.022));

      ctx.font = `600 ${fontSize}px system-ui, -apple-system, Segoe UI, Roboto`;
      ctx.textBaseline = "bottom";
      ctx.textAlign = "right";

      const text = "edamame brain";
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillText(text, c.width - pad + 2, c.height - pad + 2);
      ctx.fillStyle = "rgba(255,255,255,0.70)";
      ctx.fillText(text, c.width - pad, c.height - pad);

      resolve(c.toDataURL("image/png"));
    };

    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function loadImage(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function getProductPlacement(canvas, productImg, aspect){
  const ratio = productImg.naturalWidth / productImg.naturalHeight;

  let maxW = canvas.width * 0.34;
  let maxH = canvas.height * 0.56;

  if (aspect === "9:16") {
    maxW = canvas.width * 0.52;
    maxH = canvas.height * 0.50;
  }

  if (aspect === "1:1") {
    maxW = canvas.width * 0.40;
    maxH = canvas.height * 0.56;
  }

  let drawWidth = maxW;
  let drawHeight = drawWidth / ratio;

  if (drawHeight > maxH) {
    drawHeight = maxH;
    drawWidth = drawHeight * ratio;
  }

  const drawX = (canvas.width - drawWidth) / 2;
  const drawY = (canvas.height - drawHeight) / 2 - canvas.height * 0.02;

  return { drawX, drawY, drawWidth, drawHeight };
}

function drawPremiumShadow(ctx, canvas, drawX, drawY, drawWidth, drawHeight){
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.filter = `blur(${Math.max(18, Math.round(canvas.width * 0.012))}px)`;
  ctx.beginPath();
  ctx.ellipse(
    drawX + drawWidth / 2,
    drawY + drawHeight + canvas.height * 0.035,
    drawWidth * 0.30,
    Math.max(14, canvas.height * 0.018),
    0,
    0,
    Math.PI * 2
  );
  ctx.fill();
  ctx.restore();
}

function drawFakeLighting(ctx, canvas, drawX, drawY, drawWidth, drawHeight, lightDirection){
  ctx.save();

  const cx = drawX + drawWidth / 2;
  const cy = drawY + drawHeight / 2;

  if (lightDirection === "left") {
    const grad = ctx.createRadialGradient(
      drawX + drawWidth * 0.10, cy, 10,
      drawX + drawWidth * 0.10, cy, drawWidth * 0.95
    );
    grad.addColorStop(0, "rgba(255,255,255,0.20)");
    grad.addColorStop(0.4, "rgba(255,255,255,0.08)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(drawX - drawWidth * 0.20, drawY - drawHeight * 0.12, drawWidth * 1.1, drawHeight * 1.24);
  } else if (lightDirection === "back") {
    const grad = ctx.createRadialGradient(
      cx, drawY + drawHeight * 0.15, 20,
      cx, drawY + drawHeight * 0.15, drawWidth * 0.95
    );
    grad.addColorStop(0, "rgba(255,255,255,0.18)");
    grad.addColorStop(0.45, "rgba(255,255,255,0.06)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(drawX - drawWidth * 0.12, drawY - drawHeight * 0.15, drawWidth * 1.24, drawHeight * 1.28);
  } else {
    const grad = ctx.createRadialGradient(
      drawX + drawWidth * 0.90, cy, 10,
      drawX + drawWidth * 0.90, cy, drawWidth * 0.95
    );
    grad.addColorStop(0, "rgba(255,255,255,0.20)");
    grad.addColorStop(0.4, "rgba(255,255,255,0.08)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(drawX + drawWidth * 0.05, drawY - drawHeight * 0.12, drawWidth * 1.1, drawHeight * 1.24);
  }

  // subtle top premium glow
  const topGlow = ctx.createLinearGradient(0, drawY - drawHeight * 0.10, 0, drawY + drawHeight * 0.35);
  topGlow.addColorStop(0, "rgba(255,255,255,0.10)");
  topGlow.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = topGlow;
  ctx.fillRect(drawX - drawWidth * 0.05, drawY - drawHeight * 0.10, drawWidth * 1.10, drawHeight * 0.45);

  ctx.restore();
}

async function compositePremiumOutput(backgroundB64, prompt, meta = {}){
  if (!uploadedProductDataUrl) {
    addMsg("No product image available.", "err");
    return;
  }

  const backgroundImg = await loadImage("data:image/png;base64," + backgroundB64);
  const productImg = await loadImage(uploadedProductDataUrl);

  const canvas = document.createElement("canvas");
  canvas.width = backgroundImg.naturalWidth;
  canvas.height = backgroundImg.naturalHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(backgroundImg, 0, 0, canvas.width, canvas.height);

  const { drawX, drawY, drawWidth, drawHeight } = getProductPlacement(canvas, productImg, meta.aspect);

  // subtle ground darkening
  ctx.save();
  const groundGrad = ctx.createRadialGradient(
    drawX + drawWidth / 2,
    drawY + drawHeight + canvas.height * 0.02,
    10,
    drawX + drawWidth / 2,
    drawY + drawHeight + canvas.height * 0.02,
    drawWidth * 0.70
  );
  groundGrad.addColorStop(0, "rgba(0,0,0,0.10)");
  groundGrad.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = groundGrad;
  ctx.fillRect(drawX - drawWidth * 0.55, drawY + drawHeight - 10, drawWidth * 2.1, canvas.height * 0.28);
  ctx.restore();

  drawPremiumShadow(ctx, canvas, drawX, drawY, drawWidth, drawHeight);

  // product untouched
  ctx.drawImage(productImg, drawX, drawY, drawWidth, drawHeight);

  // fake lighting over product area only
  drawFakeLighting(
    ctx,
    canvas,
    drawX,
    drawY,
    drawWidth,
    drawHeight,
    meta.lightDirection || "right"
  );

  const compositedDataUrl = canvas.toDataURL("image/png");
  const finalDataUrl = await watermarkDataUrl(compositedDataUrl);

  const wrapper = document.createElement("div");
  wrapper.className = "imgWrap";

  const img = document.createElement("img");
  img.className = "img";
  img.src = finalDataUrl;
  img.alt = prompt || "Generated image";

  const metaLine = document.createElement("div");
  metaLine.className = "imgMeta";
  metaLine.textContent = [
    meta.aspect ? `Aspect: ${meta.aspect}` : "",
    meta.size ? `Size: ${meta.size}` : "",
    Number.isFinite(meta.remainingToday) ? `Remaining today: ${meta.remainingToday}` : ""
  ].filter(Boolean).join(" • ");

  const downloadBtn = document.createElement("button");
  downloadBtn.className = "dlBtn";
  downloadBtn.textContent = "Download image";

  downloadBtn.onclick = () => {
    const a = document.createElement("a");
    a.href = finalDataUrl;
    a.download = `edamame-brain-${slugify(prompt)}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  wrapper.appendChild(img);

  if (metaLine.textContent) {
    wrapper.appendChild(metaLine);
  }

  wrapper.appendChild(downloadBtn);
  chat.appendChild(wrapper);
  scrollChatToBottom();
}

async function uploadProduct(file){
  const reader = new FileReader();

  reader.onload = async () => {
    try {
      const dataUrl = reader.result;

      const r = await fetch("/api/product", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sessionId,
          imageDataUrl: dataUrl
        })
      });

      const data = await r.json().catch(() => ({}));

      if (r.ok) {
        setProductState(true, dataUrl);
        addMsg("Product image uploaded. Now describe the picture you want.", "ai");
        setTimeout(() => input.focus(), 50);
      } else {
        addMsg(data.message || "Upload failed.", "err");
      }
    } catch {
      addMsg("Upload failed. Try again.", "err");
    }
  };

  reader.readAsDataURL(file);
}

async function resetSession(){
  try {
    const r = await fetch("/api/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId })
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      addMsg(data.message || "Reset failed.", "err");
      return;
    }

    chat.innerHTML = "";
    setProductState(false);
    aspectSel.value = "auto";
    addMsg("Session reset. You can start fresh.", "ai");
    addMsg("Ask for content strategy — or upload your product and create premium visuals.", "ai");
    setTimeout(() => input.focus(), 50);
  } catch {
    addMsg("Reset failed. Try again.", "err");
  }
}

async function ask(){
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  addMsg(text, "me");
  setLoadingState(true);

  const waiting = addMsg("…", "ai");

  const endpoint = hasProduct ? "/api/image" : "/api/chat";
  const payload = hasProduct
    ? {
        sessionId,
        prompt: text,
        aspect: aspectSel.value
      }
    : {
        sessionId,
        message: text
      };

  try {
    const r = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      waiting.className = "msg err";
      waiting.textContent = data.message || ("Error (" + r.status + ")");
      return;
    }

    if (hasProduct) {
      waiting.textContent = [
        "Done.",
        data.aspect ? `Aspect: ${data.aspect}` : "",
        data.size ? `Size: ${data.size}` : "",
        Number.isFinite(data.remainingToday) ? `Remaining today: ${data.remainingToday}` : ""
      ].filter(Boolean).join(" • ");

      if (data.b64) {
        await compositePremiumOutput(data.b64, text, {
          aspect: data.aspect,
          size: data.size,
          lightDirection: data.lightDirection,
          remainingToday: data.remainingToday
        });
      } else {
        addMsg("No background returned.", "err");
      }
    } else {
      waiting.textContent = data.reply || "No reply.";
    }
  } catch {
    waiting.className = "msg err";
    waiting.textContent = "Network error. Try again.";
  } finally {
    setLoadingState(false);
    setTimeout(() => input.focus(), 50);
  }
}

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  const f = e.target.files?.[0];
  if (f) uploadProduct(f);
  fileInput.value = "";
};

resetBtn.onclick = resetSession;
send.onclick = ask;

input.onkeydown = (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    ask();
  }
};

addMsg("Ask for content strategy — or upload your product and create premium visuals.", "ai");
</script>

</body>
</html>
