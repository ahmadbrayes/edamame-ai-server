<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Edamame Brain</title>

<style>
:root{
  --bg:#E9D8C2;
  --purple:#8E7CC3;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  transition:0.4s;
}

body.money-mode{
  background: radial-gradient(circle at center,#001a0f,#000);
  color:#eafff3;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:2;
}

.chat{
  background:white;
  height:60vh;
  overflow:auto;
  padding:20px;
  border-radius:16px;
}

.msg{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.me{background:#8E7CC3;color:white;}
.ai{background:#eee;}

.bar{
  display:flex;
  gap:10px;
  margin-top:10px;
}

textarea{
  flex:1;
  padding:10px;
  border-radius:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* MONEY BUTTON */
.moneyBtn{
  background:linear-gradient(135deg,#00ff88,#00cc66);
  font-weight:bold;
}

.moneyBtn.active{
  background:#111;
  color:#fff;
  box-shadow:0 0 20px rgba(0,255,136,.4);
}

/* PARTICLES */
#particles{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="wrap">

<h2>Edamame Brain</h2>

<button id="moneyBtn" class="moneyBtn">💸 Make me money</button>

<audio id="cashSound" src="/cash.mp3"></audio>

<div id="chat" class="chat"></div>

<div class="bar">
<textarea id="input" placeholder="Describe what you want..."></textarea>
<button id="send">Send</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");
const moneyBtn = document.getElementById("moneyBtn");
const sound = document.getElementById("cashSound");

let sessionId = crypto.randomUUID();
let currentMode = "default";

/* ================= CHAT ================= */

function addMsg(text, cls){
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function ask(){
  const text = input.value.trim();
  if(!text) return;

  input.value = "";
  addMsg(text,"me");

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      sessionId,
      message:text,
      mode: currentMode
    })
  });

  const data = await res.json();
  addMsg(data.reply || "No reply","ai");
}

send.onclick = ask;
input.onkeydown = e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    ask();
  }
};

/* ================= PARTICLES ================= */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];
let running = false;
let anim;

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

function createParticles(){
  particles=[];
  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2,
      speed:Math.random()*0.5+0.2
    });
  }
}

function draw(){
  if(!running) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.y -= p.speed;
    if(p.y<0){
      p.y=canvas.height;
      p.x=Math.random()*canvas.width;
    }

    ctx.beginPath();
    ctx.fillStyle="rgba(0,255,136,0.4)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  anim = requestAnimationFrame(draw);
}

function startParticles(){
  if(running) return;
  running=true;
  createParticles();
  draw();
}

function stopParticles(){
  running=false;
  cancelAnimationFrame(anim);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* ================= MONEY MODE ================= */

moneyBtn.onclick = () => {

  if(currentMode === "default"){

    currentMode = "money";

    sound.currentTime = 0;
    sound.play().catch(()=>{});

    // vibration
    if(navigator.vibrate){
      navigator.vibrate(60);
    }

    document.body.classList.add("money-mode");
    moneyBtn.classList.add("active");
    moneyBtn.textContent = "← Back";

    input.placeholder = "Type what you sell...";
    input.focus();

    addMsg("Tell me what you sell.","ai");

    startParticles();

  } else {

    currentMode = "default";

    document.body.classList.remove("money-mode");
    moneyBtn.classList.remove("active");
    moneyBtn.textContent = "💸 Make me money";

    input.placeholder = "Describe what you want...";
    input.focus();

    stopParticles();

    addMsg("Back to normal mode.","ai");
  }
};

/* ================= INIT ================= */

addMsg("Press 'Make me money' and start.","ai");

</script>

</body>
</html>
